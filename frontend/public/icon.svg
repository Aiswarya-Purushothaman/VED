<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" rx="22" fill="#0a0a0a"/>
  <!-- Balloon 1 (left) -->
  <ellipse cx="30" cy="38" rx="13" ry="16" fill="#d4a853"/>
  <line x1="30" y1="54" x2="28" y2="70" stroke="#d4a853" stroke-width="1.5"/>
  <!-- Balloon 2 (center tall) -->
  <ellipse cx="50" cy="32" rx="14" ry="18" fill="#c8972e"/>
  <line x1="50" y1="50" x2="50" y2="70" stroke="#c8972e" stroke-width="1.5"/>
  <!-- Balloon 3 (right) -->
  <ellipse cx="70" cy="38" rx="13" ry="16" fill="#e8c06a"/>
  <line x1="70" y1="54" x2="72" y2="70" stroke="#e8c06a" stroke-width="1.5"/>
  <!-- String tie -->
  <path d="M28 70 Q50 74 72 70" stroke="#d4a853" stroke-width="1.5" fill="none"/>
  <!-- Stars / sparkles -->
  <circle cx="20" cy="20" r="2" fill="#d4a853" opacity="0.8"/>
  <circle cx="80" cy="18" r="1.5" fill="#e8c06a" opacity="0.7"/>
  <circle cx="85" cy="60" r="1.5" fill="#d4a853" opacity="0.6"/>
  <circle cx="15" cy="65" r="2" fill="#c8972e" opacity="0.7"/>
  <!-- VED text -->
  <text x="50" y="92" font-family="serif" font-size="11" font-weight="bold" fill="#d4a853" text-anchor="middle" letter-spacing="3">VED</text>
</svg>
